openapi: 3.1.1
info:
  title: Ocrolus API Specifications
  summary: The Ocrolus API is a RESTful API that allows you to integrate Ocrolus services
    into your application.
  description: The Ocrolus API provides a streamlined, secure HTTP-based interface
    for automating financial document processing workflows. This RESTful API enables
    seamless integration of Ocrolus' document intelligence capabilities into your
    applications through JSON-based request and response payloads.
  termsOfService: https://legal.ocrolus.com/#terms-of-use
  contact:
    name: Ocrolus Support
    url: https://help.ocrolus.com
    email: support@ocrolus.com
  license:
    name: Proprietary License
    url: https://legal.ocrolus.com/#master-service-agreement
  version: 0.0.1-dev
servers:
- url: /
  description: Ocrolus API
paths:
  /oauth/token:
    summary: Request OAuth2 token
    description: Provides the OAuth2 client credentials token flow for API consumers.
      Use this endpoint to exchange client credentials for a bearer token.
    post:
      tags:
      - authentication
      summary: Request OAuth2 token
      description: 'This operation exchanges client credentials for an OAuth2 bearer
        token.


        **Authentication Modes:**


        - **Basic Auth** (`basicAuth`): Provide credentials via HTTP Basic Authentication
        header (`Authorization: Basic base64(client_id:client_secret)`). No request
        body is required.


        - **Body Auth** (`none`): Provide `client_id`, `client_secret`, and `grant_type`
        in the request body. All three fields are required.'
      requestBody:
        description: Request body for body authentication mode. Not required when
          using HTTP Basic Authentication.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
        required: false
      responses:
        '200':
          description: OAuth2 token response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      security:
      - {}
      - basicAuth: []
  /v1/account/settings/test_webhook_endpoint:
    summary: Test account-level webhook
    description: Allows sending a test notification to the account-level webhook endpoint.
    get:
      tags:
      - webhooks
      summary: Test account-level webhook
      description: 'This operation sends a test notification to the account-level
        webhook endpoint for the current account.


        This endpoint sends a test webhook notification to verify that the webhook
        endpoint is configured correctly and can receive notifications.


        Returns the HTTP response code and message from the webhook endpoint.'
      responses:
        '200':
          description: Test webhook request sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountLevelWebhookTestResponseWrapper'
        '400':
          description: Bad request - account-level webhook not found or invalid request.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
        '404':
          description: Account-level webhook not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/account/settings/update/webhook_endpoint:
    summary: Upsert account-level webhook
    description: Allows creating or updating the account-level webhook endpoint.
    post:
      tags:
      - webhooks
      summary: Upsert account-level webhook
      description: 'This operation creates or updates the account-level webhook endpoint.


        This endpoint creates or updates a webhook for the current account.


        If `event` is empty or not provided, the webhook will be deleted.


        The `event` parameter can be provided as a list or as a comma-separated string.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertAccountLevelWebhookRequest'
        required: true
      responses:
        '200':
          description: Account-level webhook upserted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertAccountLevelWebhookResponseWrapper'
        '400':
          description: Bad request - invalid webhook endpoint URL or invalid event
            names.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
  /v1/account/settings/webhook:
    summary: Create a webhook
    description: Allows creating a new webhook for receiving notifications.
    post:
      tags:
      - webhooks
      summary: Create a webhook
      description: 'This operation creates a new webhook for receiving notifications.


        Requires manager permissions.


        The webhook will be configured to receive notifications for the specified
        event names.


        At least one event name must be provided.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
        required: true
      responses:
        '200':
          description: Webhook created successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CreateWebhookResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid webhook configuration, invalid event
            names, or validation error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
  /v1/account/settings/webhook/{webhook_uuid}:
    summary: Get a webhook
    description: Provides webhook details by UUID.
    get:
      tags:
      - webhooks
      summary: Get a webhook
      description: 'This operation retrieves a webhook by UUID.


        Requires manager permissions.


        Returns the webhook details including UUID, description, URL, and active status.'
      parameters:
      - description: UUID of the webhook
        required: true
        schema:
          type: string
          format: uuid
        name: webhook_uuid
        in: path
      responses:
        '200':
          description: Webhook retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/GetWebhookResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Webhook not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/account/settings/webhook/{webhook_uuid}/delete:
    summary: Delete a webhook
    description: Allows deleting a webhook by UUID.
    delete:
      tags:
      - webhooks
      summary: Delete a webhook
      description: 'This operation deletes a webhook by UUID.


        Requires manager permissions.


        The webhook will be permanently deleted from the system.'
      parameters:
      - description: UUID of the webhook to delete
        required: true
        schema:
          type: string
          format: uuid
        name: webhook_uuid
        in: path
      responses:
        '200':
          description: Webhook deleted successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/DeleteWebhookResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Webhook not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/account/settings/webhook/{webhook_uuid}/events:
    summary: List webhook events
    description: Provides a list of all events associated with a webhook.
    get:
      tags:
      - webhooks
      summary: List webhook events
      description: 'This operation lists all events associated with a webhook.


        Requires manager permissions.


        Returns a list of all events that the webhook is subscribed to.'
      parameters:
      - description: UUID of the webhook
        required: true
        schema:
          type: string
          format: uuid
        name: webhook_uuid
        in: path
      responses:
        '200':
          description: Webhook events retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ListWebhookEventsResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Webhook not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/account/settings/webhook/{webhook_uuid}/test:
    summary: Test a webhook
    description: Allows sending a test notification to a webhook.
    post:
      tags:
      - webhooks
      summary: Test a webhook
      description: 'This operation sends a test notification to a webhook.


        Requires manager permissions.


        The webhook will receive a test notification for the specified event.


        The event must be attached to the webhook and both must be active.'
      parameters:
      - description: UUID of the webhook to test
        required: true
        schema:
          type: string
          format: uuid
        name: webhook_uuid
        in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookTestRequest'
        required: true
      responses:
        '200':
          description: Test webhook request sent successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/WebhookTestResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - missing event_uuid, event not attached to webhook,
            or webhook/event is not active.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
  /v1/account/settings/webhook/{webhook_uuid}/update:
    summary: Update a webhook
    description: Allows updating a webhook identified by UUID.
    post:
      tags:
      - webhooks
      summary: Update a webhook
      description: 'This operation updates a webhook by UUID.


        Requires manager permissions.


        At least one of `webhook` or `event_names` must be provided.


        The webhook configuration and/or event subscriptions can be updated.'
      parameters:
      - description: UUID of the webhook to update
        required: true
        schema:
          type: string
          format: uuid
        name: webhook_uuid
        in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
        required: true
      responses:
        '200':
          description: Webhook updated successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/UpdateWebhookResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid webhook configuration, invalid event
            names, validation error, or neither webhook nor event_names provided.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
        '404':
          description: Webhook not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/account/settings/webhook_details:
    summary: Get account-level webhook
    description: Provides the account-level webhook endpoint and subscribed events.
    get:
      tags:
      - webhooks
      summary: Get account-level webhook
      description: 'This operation retrieves the account-level webhook endpoint and
        subscribed events for the current account.


        Returns the webhook endpoint URL and list of subscribed events.


        If no webhook is configured, the webhook_endpoint will be None.'
      responses:
        '200':
          description: Account-level webhook retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertAccountLevelWebhookResponseWrapper'
        '400':
          description: Bad request - account is inactive or invalid request.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
  /v1/account/settings/webhooks:
    summary: List all webhooks
    description: Provides a list of all webhooks configured for an organization.
    get:
      tags:
      - webhooks
      summary: List all webhooks
      description: 'This operation lists all webhooks for an organization.


        Requires manager permissions.


        Returns a list of all webhooks configured for the organization.'
      responses:
        '200':
          description: Webhooks retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ListWebhooksResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/add:
    summary: Create book
    description: Allows creating a new book under the authenticated account.
    post:
      tags:
      - books
      summary: Create a new book
      description: 'This operation creates a new book with the specified name and
        optional parameters.


        The book is created for the authenticated user''s account.


        Note: The `book_type` must be either ''DEFAULT'' or ''INSTANT_ML''.

        If `is_public` is not provided, it defaults to the organization''s default
        setting.

        The `owning_account_pk` parameter is only available for widget BFF machine
        users.'
      requestBody:
        description: Book creation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookAddRequest'
        required: true
      responses:
        '200':
          description: Book created successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookAddResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/copy-jobs:
    summary: Create or list book copy jobs
    description: Allows creating book copy jobs and retrieving a paginated list of
      copy jobs.
    get:
      tags:
      - encore
      summary: List book copy jobs
      description: 'This operation retrieves a paginated list of book copy jobs.


        By default, returns outbound jobs (jobs where the current organization is
        the sender).


        You can filter by job type (OUTBOUND or INBOUND) and organization UUID.'
      parameters:
      - description: Type of jobs to retrieve
        required: false
        schema:
          type: string
          enum:
          - OUTBOUND
          - INBOUND
          default: OUTBOUND
        name: job_type
        in: query
      - description: Filter by organization UUID
        required: false
        schema:
          type: string
          format: uuid
        name: org_uuid
        in: query
      - description: Offset for pagination
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        name: offset
        in: query
      - description: Limit for pagination (1-100)
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
        name: limit
        in: query
      responses:
        '200':
          description: Book copy jobs retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/GetBookCopyJobsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid query parameters.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '403':
          description: Forbidden - insufficient permissions to access copy jobs.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
    post:
      tags:
      - encore
      summary: Create book copy jobs
      description: 'This operation creates copy jobs to copy one or more books to
        one or more recipient organizations.


        The request body accepts an array of copy job requests.


        Each request specifies a book UUID, recipient organization UUID, and an optional
        shared book label.'
      requestBody:
        description: Array of book copy job requests
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/BookCopyJobRequest'
              type: array
        required: true
      responses:
        '200':
          description: Book copy jobs created successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CreateBookCopyJobsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid request body, missing required fields,
            or validation error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '403':
          description: Forbidden - insufficient permissions to create copy jobs.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/book/forms:
    summary: Get book forms
    description: Retrieves all forms and their field data for a book.
    get:
      tags:
      - capture
      summary: Get book forms
      description: 'This operation retrieves all forms and their field data for a
        book.


        The response includes book metadata and a list of forms, each containing form
        type, raw field data, table data, and validation information.


        Either `pk` or `book_uuid` must be provided to identify the book.'
      parameters:
      - description: Primary key of the book
        required: false
        schema:
          type: integer
        name: pk
        in: query
      - description: UUID of the book
        required: false
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: query
      responses:
        '200':
          description: Book forms retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookFormsResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/import/plaid/asset:
    summary: Upload Plaid Asset Report
    description: Allows uploading a Plaid asset report into a book using an audit
      copy token.
    post:
      tags:
      - doc-upload
      summary: Upload Plaid Asset Report
      description: 'This operation uploads a Plaid asset report into a book using
        an audit copy token.


        It stores the asset data from Plaid in the specified book as a document.


        Note: Exactly one of `pk` or `uuid` must be provided to identify the book.'
      requestBody:
        description: Plaid asset report upload request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadPlaidAssetReportRequest'
        required: true
      responses:
        '200':
          description: Plaid asset report uploaded successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/UploadPlaidAssetReportResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - missing required parameters or invalid request.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                  code:
                    type: integer
                    description: Error code
                type: object
  /v1/book/info:
    summary: Get book details
    description: Provides metadata, ownership, and status details for a specific book.
    get:
      tags:
      - books
      summary: Get book information
      description: 'This operation returns metadata, status, and ownership information
        for a book.


        Note: Exactly one of `pk` or `book_uuid` must be provided to identify the
        book.'
      parameters:
      - description: Primary key of the book
        required: false
        schema:
          type: integer
          minimum: 1
        name: pk
        in: query
      - description: UUID of the book
        required: false
        schema:
          type: string
        name: book_uuid
        in: query
      responses:
        '200':
          description: Book information response.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookInfoResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/remove:
    summary: Delete book
    description: Allows marking a completed book for deletion from the authenticated
      account.
    post:
      tags:
      - books
      summary: Delete a book
      description: "This operation deletes a book by its primary key or UUID.\n\n\
        The book must be complete (all documents processed) before it can be removed.\n\
        \nNote: Exactly one of `book_id` (pk) or `book_uuid` must be provided to identify\
        \ the book.\nThis operation is asynchronous\u2014the book is marked for deletion\
        \ and removed in the background."
      requestBody:
        description: Book deletion request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookDeleteRequest'
        required: true
      responses:
        '200':
          description: Book deletion initiated successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookDeleteResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/status:
    summary: Get book status
    description: Provides the current processing status and key metadata for a specific
      book.
    get:
      tags:
      - books
      summary: Get book status
      description: 'This operation returns the latest status, documents, and metadata
        for a book.


        Note: Exactly one of `pk` or `book_uuid` must be provided to identify the
        book.'
      parameters:
      - description: Primary key of the book
        required: false
        schema:
          type: integer
          minimum: 1
        name: pk
        in: query
      - description: UUID of the book
        required: false
        schema:
          type: string
        name: book_uuid
        in: query
      responses:
        '200':
          description: Book status response.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookStatusResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/update:
    summary: Update book
    description: Allows updating the metadata and sharing settings for an existing
      book.
    post:
      tags:
      - books
      summary: Update a book
      description: "This operation updates a book's properties.\n\nAll fields are\
        \ optional\u2014only provided fields are changed.\n\nNote: Exactly one of\
        \ `pk` or `book_uuid` must be provided to identify the book.\nIf `is_public`\
        \ is set to true, all shared books are cleared.\nUpdating `book_class` may\
        \ trigger the book to be requeued for processing."
      requestBody:
        description: Book update request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookUpdateRequest'
        required: true
      responses:
        '200':
          description: Book updated successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookUpdateResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/upload:
    summary: Upload book documents
    description: Allows uploading one or more documents to a book using multipart
      form data.
    post:
      tags:
      - doc-upload
      summary: Upload documents to a book
      description: 'This operation uploads one or more documents to a book.


        Supports uploading multiple files in a single request.

        Exactly one of `pk` or `book_uuid` must be provided to identify the book.


        If a document with the same checksum already exists, the response will include
        error details with the existing document''s PK and UUID.'
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                pk:
                  type: integer
                  description: Primary key of the book
                book_uuid:
                  type: string
                  format: uuid
                  description: UUID of the book
                form_type:
                  type: string
                  description: Form type of the document
                doc_name:
                  type: string
                  description: Name of the document. Defaults to the name of the file
                    uploaded if not given.
                verification_type:
                  type: string
                  description: Verification type
                file:
                  items:
                    type: string
                    format: binary
                  type: array
                  description: One or more files to upload
              type: object
              required: []
        required: true
      responses:
        '200':
          description: Upload response (may include error details for duplicate documents).
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookUploadResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/upload/image:
    summary: Upload book image
    description: Allows uploading a single image to a book using multipart form data.
    post:
      tags:
      - doc-upload
      summary: Upload an image to a book
      description: 'This operation uploads a single image to a book.


        Exactly one of `pk` or `book_uuid` must be provided to identify the book.


        Only a single image file can be uploaded per request.


        The uploaded image will be added to an image group for the book.'
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                pk:
                  type: integer
                  description: Primary key of the book
                book_uuid:
                  type: string
                  format: uuid
                  description: UUID of the book
                file:
                  type: string
                  format: binary
                  description: Image file to upload
                return_image_pk:
                  type: boolean
                  description: Whether to return the image PK in the response
              type: object
              required: []
        required: true
      responses:
        '200':
          description: Image uploaded successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/UploadImageResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/upload/image/done:
    summary: Finalize image group
    description: Allows finalizing an image group for a book, creating a document
      from the uploaded images.
    post:
      tags:
      - doc-upload
      summary: Finalize an image group
      description: 'This operation finalizes an image group for a book.


        Exactly one of `pk` or `book_uuid` must be provided to identify the book.


        This endpoint finalizes the image group that is currently in ''Uploading''
        status for the book.


        If `form_type` is provided, an UploadedDoc will be created with that form
        type.

        If `form_type` is not provided, a MixedUploadedDoc will be created for classification.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeImageGroupRequest'
        required: true
      responses:
        '200':
          description: Image group finalized successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/FinalizeImageGroupResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/upload/json:
    summary: Upload Plaid JSON
    description: Allows uploading Plaid Asset Report or Transaction JSON data to a
      book.
    post:
      tags:
      - doc-upload
      summary: Upload Plaid JSON
      description: 'This operation uploads Plaid Asset Report or Transaction JSON
        data to a book.


        Supports uploading multiple JSON files in a single request.

        Exactly one of `pk` or `uuid` must be provided to identify the book.


        Upload intent can be specified as `ADD_ANALYTICS` or `DOCS_TO_DIGITAL`.'
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                pk:
                  type: integer
                  description: Primary key of the book
                uuid:
                  type: string
                  format: uuid
                  description: UUID of the book
                doc_name:
                  type: string
                  description: Name of the document
                upload_intent:
                  type: string
                  enum:
                  - ADD_ANALYTICS
                  - DOCS_TO_DIGITAL
                  description: Upload intent
                file:
                  items:
                    type: string
                    format: binary
                  type: array
                  description: One or more JSON files to upload
              type: object
              required: []
        required: true
      responses:
        '200':
          description: Upload response.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookUploadJsonResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/book/upload/mixed:
    summary: Upload mixed documents
    description: Allows uploading one or more mixed documents to a book using multipart
      form data.
    post:
      tags:
      - doc-upload
      summary: Upload mixed documents to a book
      description: 'This operation uploads one or more mixed documents to a book.


        Supports uploading multiple files in a single request.

        Exactly one of `pk` or `book_uuid` must be provided to identify the book.


        If a document with the same checksum already exists, the response will include
        error details with the existing document''s PK and UUID.'
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                pk:
                  type: integer
                  description: Primary key of the book
                book_uuid:
                  type: string
                  format: uuid
                  description: UUID of the book
                doc_name:
                  type: string
                  description: Name of the document. Defaults to the name of the file
                    uploaded if not given.
                file:
                  items:
                    type: string
                    format: binary
                  type: array
                  description: One or more files to upload
              type: object
              required: []
        required: true
      responses:
        '200':
          description: Upload response (may include error details for duplicate documents).
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookUploadMixedResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/books:
    summary: List books
    description: Provides a paginated, filterable view of the books accessible to
      the current user's account.
    get:
      tags:
      - books
      summary: List books
      description: 'This operation returns the books accessible to the current user''s
        account.


        Supports filtering by name, search term, or external ID (`xid`).

        Pagination and sorting controls are also available.

        Providing `limit` is recommended so the response includes pagination links.

        When `limit` is omitted, the entire collection is returned.


        Note: Only one of `name` or `search` can be provided, not both.'
      parameters:
      - description: Number of books to skip for pagination
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        name: offset
        in: query
      - description: 'Maximum number of books to return.


          Preferred: Provide this value.

          Optional only for backward compatibility; if not provided, all books are
          returned.'
        required: false
        schema:
          type: integer
          minimum: 0
          default: 25
        name: limit
        in: query
      - description: 'Array of fields to sort by.


          Each value must be one of `pk`, `name`, or `created`.'
        required: false
        style: form
        explode: false
        schema:
          items:
            type: string
            enum:
            - pk
            - name
            - created
          type: array
          default:
          - pk
        name: order_by
        in: query
      - description: 'Array of sort orders.


          Each value must be `ASC` or `DESC`.

          Note: The number of values in this array must match the length of the `order_by`
          array.'
        required: false
        style: form
        explode: false
        schema:
          items:
            type: string
            enum:
            - ASC
            - DESC
          type: array
          default:
          - DESC
        name: order
        in: query
      - description: 'Filter by exact book name.


          Note: Only one of `name` or `search` can be provided, not both.'
        required: false
        schema:
          type: string
        name: name
        in: query
      - description: 'Filter by book name using a case-insensitive search.


          Note: Only one of `name` or `search` can be provided, not both.'
        required: false
        schema:
          type: string
        name: search
        in: query
      - description: Filter by external ID (`xid`)
        required: false
        schema:
          type: string
        name: xid
        in: query
      responses:
        '200':
          description: Book list response.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookListResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/document/cancel:
    summary: Cancel document verification
    description: Allows canceling verification for a document that is still in a cancelable
      status.
    post:
      tags:
      - doc-upload
      summary: Cancel document verification
      description: 'This operation cancels verification for a document.


        Exactly one of `doc_pk` or `doc_uuid` must be provided to identify the document.


        This endpoint cancels the verification process for a document that is currently
        being processed.


        Documents in certain statuses (e.g., completed) cannot be canceled.


        If `accept_charges` is provided, it indicates whether to accept charges for
        canceling the document.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelDocumentRequest'
        required: true
      responses:
        '200':
          description: Document cancellation request processed successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CancelDocumentResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '406':
          description: Document cannot be canceled (e.g., already completed or in
            an uncancelable status).
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Response message
                  response:
                    type: string
                    description: Error message
                type: object
  /v1/document/forms/fields:
    summary: Get document forms fields
    description: Retrieves all forms and their field data for a document.
    get:
      tags:
      - capture
      summary: Get document forms fields
      description: 'This operation retrieves all forms and their field data for a
        document.


        The response includes document metadata and a list of forms, each containing
        form type, raw field data, table data, and validation information.


        Either `pk` or `doc_uuid` must be provided to identify the document.


        If `include_all` is set to true, all forms will be included regardless of
        status.


        If normalized fields are included in the organization configuration, the response
        will include formatted values for each field.


        If validation data is included in the organization configuration, the response
        will include validation information for each field.'
      parameters:
      - description: Primary key of the document
        required: false
        schema:
          type: integer
        name: pk
        in: query
      - description: UUID of the document
        required: false
        schema:
          type: string
          format: uuid
        name: doc_uuid
        in: query
      - description: Whether to include all forms regardless of status
        required: false
        schema:
          type: boolean
        name: include_all
        in: query
      - description: Whether to include bounding box information
        required: false
        schema:
          type: boolean
        name: include_bboxes
        in: query
      responses:
        '200':
          description: Document forms fields retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/DocumentFormsFieldsResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/document/mixed/status:
    summary: Get mixed document status
    description: Provides the status and details of a mixed document.
    get:
      tags:
      - doc-upload
      summary: Get mixed document status
      description: 'This operation returns the status and details of a mixed document.


        Exactly one of `pk`, `doc_uuid`, or `mixed_doc_uuid` must be provided to identify
        the mixed document.


        When the document status is ''COMPLETED'', the response includes additional
        information about the uploaded documents and pages.'
      parameters:
      - description: Primary key of the mixed document
        required: false
        schema:
          type: integer
        name: pk
        in: query
      - description: UUID of the mixed document
        required: false
        schema:
          type: string
          format: uuid
        name: doc_uuid
        in: query
      - description: UUID of the mixed document (alternative to doc_uuid)
        required: false
        schema:
          type: string
          format: uuid
        name: mixed_doc_uuid
        in: query
      responses:
        '200':
          description: Mixed document status retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/MixedDocumentStatusResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - both pk and uuid provided, or neither provided,
            or document not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/document/mixed/upgrade:
    summary: Upgrade a mixed document
    description: Allows upgrading a mixed document to a higher processing tier.
    post:
      tags:
      - doc-upload
      summary: Upgrade a mixed document
      description: 'This operation upgrades a mixed document to a higher processing
        type.


        Exactly one of `mixed_doc_pk` or `mixed_doc_uuid` must be provided to identify
        the mixed document.


        The `upgrade_type` parameter specifies the target processing type (e.g., ''INSTANT'',
        ''COMPLETE'').


        This endpoint upgrades the mixed document''s processing type and initiates
        the upgrade process.


        The document status will be set to ''Processing'' during the upgrade process.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpgradeMixedDocumentRequest'
        required: true
      responses:
        '200':
          description: Mixed document upgrade request processed successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/UpgradeDocumentResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid upgrade type, document cannot be upgraded,
            or upgrade not permitted.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/document/remove:
    summary: Remove a document
    description: Allows removing (deleting) a document from a book.
    post:
      tags:
      - doc-upload
      summary: Remove a document
      description: 'This operation removes (deletes) a document from a book.


        Exactly one of `doc_id` or `doc_uuid` must be provided to identify the document.


        This endpoint marks the document for deletion and initiates the deletion process.


        The document status will be set to ''Deleting'' and the actual deletion will
        be processed asynchronously.


        Documents in certain statuses (e.g., unavailable statuses) cannot be removed,
        except for Failed and Rejected documents.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveDocumentRequest'
        required: true
      responses:
        '200':
          description: Document removal request processed successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/RemoveDocumentResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - both doc_id and doc_uuid provided, or neither
            provided.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/document/upgrade:
    summary: Upgrade a document
    description: Allows upgrading a document to a higher processing tier.
    post:
      tags:
      - doc-upload
      summary: Upgrade a document
      description: 'This operation upgrades a document to a higher processing type.


        Exactly one of `doc_pk` or `doc_uuid` must be provided to identify the document.


        The `upgrade_type` parameter specifies the target processing type (e.g., ''INSTANT'',
        ''COMPLETE'').


        This endpoint upgrades the document''s processing type and initiates the upgrade
        process.


        The document status will be set to ''Grooming'' during the upgrade process.'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpgradeDocumentRequest'
        required: true
      responses:
        '200':
          description: Document upgrade request processed successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/UpgradeDocumentResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid upgrade type, document cannot be upgraded,
            or upgrade not permitted.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/form:
    summary: Get form data
    description: Retrieves form data including raw field values for a single form.
    get:
      tags:
      - capture
      summary: Get form data
      description: 'This operation retrieves form data for a single form.


        The response includes form metadata and raw field data.


        Either `pk` or `uuid` must be provided to identify the form.


        If normalized fields are included in the organization configuration, the response
        will include formatted values for each field.


        If validation data is included in the organization configuration, the response
        will include `doc_validations` with validation information.'
      parameters:
      - description: Primary key of the form
        required: false
        schema:
          type: integer
        name: pk
        in: query
      - description: UUID of the form
        required: false
        schema:
          type: string
          format: uuid
        name: uuid
        in: query
      responses:
        '200':
          description: Form data retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/FormResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v1/settings/book-copy:
    summary: Get book copy settings
    description: Provides book copy settings including allowed recipient and sender
      organizations.
    get:
      tags:
      - encore
      summary: Get book copy settings
      description: 'This operation retrieves book copy settings for the current organization.


        The response includes two lists:

        - `recipients`: Organizations that the current org can send books to (outbound)

        - `senders`: Organizations that can send books to the current org (inbound)'
      responses:
        '200':
          description: Book copy settings retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/GetBookCopySettingsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/settings/book-copy/kickout-rules:
    summary: Get or save book copy kickout rules
    description: Provides kickout rules for book copy operations.
    get:
      tags:
      - encore
      summary: Get book copy kickout rules
      description: 'This operation retrieves book copy kickout rules for the current
        organization.


        Kickout rules define criteria for automatically rejecting book copies based
        on factors such as industry, state, revenue, expenses, fintech debt positions,
        and NSF counts.'
      responses:
        '200':
          description: Kickout rules retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookCopyKickoutRulesResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '404':
          description: Kickout rules not found for the organization.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
    put:
      tags:
      - encore
      summary: Save book copy kickout rules
      description: 'This operation saves book copy kickout rules for the current organization.


        This is an upsert operation - it creates new rules if none exist, or updates
        existing rules by creating a new version and deactivating the previous version.


        All fields are optional; only provided fields will be updated.'
      requestBody:
        description: Kickout rules to save
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookCopyKickoutRulesRequest'
        required: true
      responses:
        '200':
          description: Kickout rules saved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookCopyKickoutRulesResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid request body or validation error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '401':
          description: Unauthorized - authentication required.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v1/transaction:
    summary: Get transaction list
    description: Retrieves a list of transactions for a book or document.
    get:
      tags:
      - capture
      summary: Get transaction list
      description: 'This operation retrieves a list of transactions for a book or
        document.


        The response includes transactions, uploaded documents, and bank accounts.


        Either `book_pk` or `book_uuid` must be provided to identify the book.


        Optionally, `uploaded_doc_pk` or `uploaded_doc_uuid` can be provided to filter
        transactions for a specific document.


        If `only_tagged` is set to true, only transactions with tags will be returned.
        This requires `distinct_fields` to also be true.


        If `distinct_fields` is set to true, only distinct field values will be returned.


        If `include_page_info` is set to true, page information will be included in
        the response.'
      parameters:
      - description: Primary key of the book
        required: false
        schema:
          type: integer
        name: book_pk
        in: query
      - description: UUID of the book
        required: false
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: query
      - description: Primary key of the uploaded document
        required: false
        schema:
          type: integer
        name: uploaded_doc_pk
        in: query
      - description: UUID of the uploaded document
        required: false
        schema:
          type: string
          format: uuid
        name: uploaded_doc_uuid
        in: query
      - description: Whether to return only tagged transactions (requires distinct_fields=true)
        required: false
        schema:
          type: boolean
        name: only_tagged
        in: query
      - description: Whether to return only distinct field values
        required: false
        schema:
          type: boolean
        name: distinct_fields
        in: query
      - description: Whether to include page information
        required: false
        schema:
          type: boolean
        name: include_page_info
        in: query
      responses:
        '200':
          description: Transaction list retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/TransactionResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/analytics/book/{book_uuid}/transactions:
    summary: Update transactions
    description: Allows updating tags for multiple transactions in a book.
    put:
      tags:
      - tags
      summary: Update transactions
      description: 'This operation updates tags for multiple transactions in a book.


        Each transaction update specifies which tags to apply or remove.


        The `apply_to_txn` field in each tag update determines whether the tag should
        be applied (true) or removed (false) from the transaction.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      requestBody:
        description: Transaction update data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
        required: true
      responses:
        '204':
          description: Transactions updated successfully.
        '400':
          description: Bad request - invalid book UUID, missing txns field, empty
            list, or validation error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '403':
          description: Forbidden - insufficient permissions to update transactions.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '404':
          description: Not found - book with the specified UUID does not exist.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v2/analytics/revenue-deduction-tags:
    summary: Get or update revenue deduction tags
    description: Provides a list of revenue deduction tag UUIDs and allows updating
      the list.
    get:
      tags:
      - tags
      summary: Get revenue deduction tags
      description: 'This operation retrieves a list of revenue deduction tag UUIDs.


        Revenue deduction tags are used to identify transactions that should be treated
        as revenue deductions in analytics calculations.'
      responses:
        '200':
          description: Revenue deduction tags retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/GetRevenueDeductionTagsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions to access revenue deduction
            tags.
          content:
            application/json:
