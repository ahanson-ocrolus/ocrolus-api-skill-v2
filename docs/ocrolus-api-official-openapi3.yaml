  /v2/book/{book_uuid}/benchmark:
    summary: Get benchmark data
    description: Retrieves benchmark analytics comparing a book's performance to industry
      peers.
    get:
      tags:
      - analyze
      summary: Get benchmark data
      description: 'This operation retrieves benchmark analytics comparing a book''s
        financial performance to industry peers based on NAICS industry classification.


        The response includes:

        - Book identification and time period (start_month, end_month)

        - Industry classification (NAICS 4-digit code and title)

        - Benchmark metrics showing the book''s values and percentile rankings compared
        to industry peers


        Common metrics include revenue, expense, fintech inflows, and fintech outflows.


        Percentile values range from 0.0 to 100.0, where higher values indicate better
        performance relative to industry peers.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      responses:
        '200':
          description: Benchmark data retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BenchmarkResponse'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/book/{book_uuid}/cash_flow_features:
    summary: Get cash flow features
    description: Retrieves cash flow features and analytics for a book.
    get:
      tags:
      - analyze
      summary: Get cash flow features
      description: 'This operation retrieves cash flow features and analytics for
        a book.


        The response includes comprehensive cash flow metrics such as:

        - Credit and debit averages, minimums, maximums, standard deviations, and
        coefficients of variation

        - Payroll payments statistics

        - Insurance payments and deposits statistics

        - Fintech transaction statistics (Venmo, Zelle, CashApp, PayPal)

        - ATM withdrawals and deposits statistics

        - Check payments and deposits statistics

        - And various other financial metrics


        The response also includes metadata about uploaded documents in the book.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      responses:
        '200':
          description: Cash flow features retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CashflowFeaturesResponse'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/book/{book_uuid}/cash_flow_risk_score:
    summary: Get cash flow risk score
    description: Calculates and retrieves the cash flow risk score (probability of
      default) for a book.
    get:
      tags:
      - analyze
      summary: Get cash flow risk score
      description: 'This operation calculates and retrieves the cash flow risk score
        (probability of default) for a book.


        The risk score is calculated using machine learning models that analyze cash
        flow patterns, transaction behaviors, and various financial metrics.


        The response includes:

        - `proba_default`: The probability of default (0.0 to 1.0)

        - `feature_importance`: A dictionary showing which features contributed most
        to the risk score

        - `model_version`: The version of the risk model used

        - `error`: Error message if the calculation failed


        Note: This endpoint requires the `IS_RISK_SCORE_ENABLED` feature flag to be
        enabled for the organization.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      responses:
        '200':
          description: Cash flow risk score calculated successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/CashFlowRiskScoreResponse'
                - $ref: '#/components/schemas/ErrorResponse'
