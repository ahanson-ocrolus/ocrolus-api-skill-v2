  /v2/book/{book_uuid}/enriched_txns:
    summary: Get enriched transactions
    description: Retrieves enriched transaction data for a book with pagination support.
    get:
      tags:
      - analyze
      summary: Get enriched transactions
      description: 'This operation retrieves enriched transaction data for a book.


        The response includes a paginated list of enriched transactions with detailed
        information such as transaction date, amount, counterparty, category, tags,
        and various enrichment fields.


        Pagination is supported via the `offset` and `limit` query parameters.


        The response also includes metadata about uploaded documents in the book.


        Optional fields may be included based on feature flags:

        - `plaid_asset_reports`: Included if Plaid IDs are enabled

        - `mismatched_transactions`: Included if Plaid to PDF conversion is enabled

        - `bank_checks`: Included if bank checks are available'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      - description: Offset for pagination (number of transactions to skip)
        required: false
        schema:
          type: integer
        name: offset
        in: query
      - description: Limit for pagination (maximum number of transactions to return)
        required: false
        schema:
          type: integer
        name: limit
        in: query
      responses:
        '200':
          description: Enriched transactions retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/EnrichedTransactionsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
