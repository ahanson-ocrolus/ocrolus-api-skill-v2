                  message:
                    type: string
                    description: Error message
                type: object
  /v2/book/{book_uuid}/income/summary:
    summary: Get income summary
    description: Provides income summary data for a book based on the specified income
      guideline.
    get:
      tags:
      - income
      summary: Get income summary
      description: 'This operation retrieves income summary data for a book.


        The response includes income summaries for each borrower, broken down by income
        type (wage earner, self-employed, rental, and other income).


        If `guideline` is not provided, it defaults to FANNIE_MAE.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      - description: Income guideline to use for summary
        required: false
        schema:
          type: string
          enum:
          - FANNIE_MAE
          - FREDDIE_MAC
          - FHA
          - VA
          - USDA
          default: FANNIE_MAE
        name: guideline
        in: query
      responses:
        '200':
          description: Income summary retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookIncomeSummaryResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid book UUID or invalid guideline provided.
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                    description: Error message
                type: object
        '403':
          description: Forbidden - no permission to access this book.
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  error:
                    type: string
                    description: Error message
                type: object
  /v2/book/{book_uuid}/lender_analytics/xlsx:
    summary: Get lender analytics XLSX
    description: Retrieves lender analytics data for a book as an Excel file.
    get:
      tags:
      - analyze
      summary: Get lender analytics XLSX
      description: 'This operation retrieves lender analytics data for a book as an
        Excel (XLSX) file.


        The response is a downloadable Excel file containing comprehensive lender
        analytics including transaction data, cash flow metrics, and various financial
        analyses.


        The file format and content may vary based on feature flags configured for
        the organization.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      responses:
        '200':
          description: Lender analytics XLSX file retrieved successfully.
          headers:
            Content-Disposition:
              description: Content-Disposition header with filename
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
  /v2/book/{book_uuid}/mixed-document:
    summary: Upload mixed document
    description: Allows uploading a single mixed document to a book using multipart
      form data.
    post:
      tags:
      - doc-upload
      summary: Upload a mixed document to a book
      description: 'This operation uploads a single mixed document to a book.


        The book is identified by `book_uuid` in the path.


        Only a single file can be uploaded per request.


        If a document with the same checksum already exists, the response will include
        error details with the existing document''s UUID.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload
              type: object
              required: []
        required: true
      responses:
        '200':
          description: Upload response (may be error response if document already
            exists).
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/MixedDocumentResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/book/{book_uuid}/paystub:
    summary: Get book paystub data
    description: Retrieves all paystub data for a book.
    get:
      tags:
      - capture
      summary: Get book paystub data
      description: 'This operation retrieves all paystub data for a book.


        The response includes a list of paystub objects, each containing employer
        information, employee information, paystub details, earnings, deductions,
        and net pay data.


        If normalized fields are included in the organization configuration, the response
        will include `formatted_data` for each paystub.


        If validation data is included in the organization configuration, the response
        will include `validations_summary` for each paystub.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      responses:
        '200':
          description: Book paystub data retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookPaystubResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/book/{book_uuid}/summary:
    summary: Get book summary
    description: Retrieves comprehensive analytics and summary data for a book.
    get:
      tags:
      - analyze
      summary: Get book summary
      description: 'This operation retrieves comprehensive analytics and summary data
        for a book.


        The response includes detailed analytics such as bank account information,
        transaction summaries, uploaded documents metadata, and various financial
        metrics.


        The `scope` parameter controls whether to return full analytics or quick check
        analytics. When `QUICK_CHECK_ANALYTICS` feature flag is enabled, the default
        scope is ''quick'' unless explicitly set to ''full''.


        Optional query parameters allow filtering by bank accounts and months to exclude.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      - description: 'Scope of analytics to return: ''full'' for complete analytics,
          ''quick'' for quick check analytics'
        required: false
        schema:
          type: string
          enum:
          - full
          - quick
        name: scope
        in: query
      - description: 'Comma-separated list of months to exclude from analytics (format:
          YYYY-MM)'
        required: false
        schema:
          type: string
        name: exclude_months
        in: query
      - description: Comma-separated list of bank account primary keys to exclude
          from analytics
        required: false
        schema:
          type: string
        name: exclude_bank_account_pks
        in: query
      responses:
        '200':
          description: Book summary retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookSummaryResponse'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/detect/book/{book_uuid}/signals:
    summary: Get book signals
    description: Retrieves fraud detection signals for a book.
    get:
      tags:
      - detect
      summary: Get book signals
      description: 'This operation retrieves fraud detection signals for a book.


        The response includes document analyses with signals, form analyses, visualizations,
        and authenticity scores for each form.


        If `exclude_dashboard_url` is set to true, dashboard URLs will be excluded
        from the response.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      - description: Whether to exclude dashboard URLs from the response
        required: false
        schema:
          type: boolean
        name: exclude_dashboard_url
        in: query
      responses:
        '200':
          description: Book signals retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookSignalsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/detect/uploaded_doc/{uploaded_doc_uuid}/signals:
    summary: Get uploaded document signals
    description: Retrieves fraud detection signals for an uploaded document.
    get:
      tags:
      - detect
      summary: Get uploaded document signals
      description: 'This operation retrieves fraud detection signals for an uploaded
        document.


        The response includes document analysis with signals, form analyses, visualizations,
        and authenticity scores for each form in the document.


        If `exclude_dashboard_url` is set to true, dashboard URLs will be excluded
        from the response.'
      parameters:
      - description: UUID of the uploaded document
        required: true
        schema:
          type: string
          format: uuid
        name: uploaded_doc_uuid
        in: path
      - description: Whether to exclude dashboard URLs from the response
        required: false
        schema:
          type: boolean
        name: exclude_dashboard_url
        in: query
      responses:
        '200':
          description: Uploaded document signals retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BookSignalsResponse'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/detect/visualization/{visualization_uuid}:
    summary: Get visualization data
    description: Retrieves visualization image or PDF data for a specific visualization
      UUID.
    get:
      tags:
      - detect
      summary: Get visualization data
      description: 'This operation retrieves visualization image or PDF data for a
        specific visualization UUID.


        The response is binary data (image or PDF) with appropriate content type headers.


        The `size` parameter can be used to specify the size of the visualization
        image.


        The response includes Cache-Control and Etag headers for caching.'
      parameters:
      - description: UUID of the visualization
        required: true
        schema:
          type: string
          format: uuid
        name: visualization_uuid
        in: path
      - description: Size of the visualization image
        required: false
        schema:
          type: string
        name: size
        in: query
      responses:
        '200':
          description: Visualization data retrieved successfully.
          headers:
            Cache-Control:
              description: Cache control header
              schema:
                type: string
            Etag:
              description: Entity tag for cache validation
              schema:
                type: string
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
  /v2/document/download:
    summary: Download a document
    description: Provides the original copy of an uploaded document file for download.
    get:
      tags:
      - doc-upload
      summary: Download a document
      description: 'This operation downloads the original copy of an uploaded document
        file.


        The document is identified by `doc_uuid` in the query parameters.


        If `doc_type` is ''MixedUploadedDoc'', the endpoint will download a mixed
        document.


        If `doc_type` is ''UploadedDoc'' (default), the endpoint will download a regular
        uploaded document.


        The file is returned as a binary download with appropriate Content-Disposition
        headers.'
      parameters:
      - description: UUID of the document to download
        required: true
        schema:
          type: string
          format: uuid
        name: doc_uuid
        in: query
      - description: 'Type of document: ''UploadedDoc'' (default) or ''MixedUploadedDoc'''
        required: false
        schema:
          type: string
          enum:
          - UploadedDoc
          - MixedUploadedDoc
          default: UploadedDoc
        name: doc_type
        in: query
      responses:
        '200':
          description: Document file downloaded successfully.
          headers:
            Content-Disposition:
              description: Content-Disposition header with filename
              schema:
                type: string
            Etag:
              description: ETag header for caching
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
  /v2/document/{doc_uuid}/paystub:
    summary: Get document paystub data
    description: Retrieves paystub data for a document.
    get:
      tags:
      - capture
      summary: Get document paystub data
      description: 'This operation retrieves paystub data for a document.


        The response includes a list of paystub objects, each containing employer
        information, employee information, paystub details, earnings, deductions,
        and net pay data.


        If normalized fields are included in the organization configuration, the response
        will include `formatted_data` for each paystub.


        If validation data is included in the organization configuration, the response
        will include `validations_summary` for each paystub.


        If `include_page_doc_info` is set to true, the response will include page
        document information for each paystub.'
      parameters:
      - description: UUID of the document
        required: true
        schema:
          type: string
          format: uuid
        name: doc_uuid
        in: path
      - description: Whether to include page document information
        required: false
        schema:
          type: boolean
        name: include_page_doc_info
        in: query
      responses:
        '200':
          description: Document paystub data retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/DocumentPaystubResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/index/mixed-doc/{mixed_doc_uuid}/summary:
    summary: Get mixed document grouped summary
    description: Retrieves the grouped classification summary for all forms in a mixed
      document.
    get:
      tags:
      - classify
      summary: Get mixed document grouped summary
      description: 'This operation retrieves the grouped classification summary for
        all forms in a mixed document.


        The response includes form groups where forms sharing the same pages are grouped
        together.


        Each form group contains page indexes and the forms associated with those
        pages, including form details such as status, form type, uniqueness values,
        and whether it is a parent form.


        If `split_unknowns` is set to true, unknown forms will be split into separate
        groups.'
      parameters:
      - description: UUID of the mixed document
        required: true
        schema:
          type: string
          format: uuid
        name: mixed_doc_uuid
        in: path
      - description: Whether to split unknown forms into separate groups
        required: false
        schema:
          type: boolean
        name: split_unknowns
        in: query
      responses:
        '200':
          description: Grouped classification summary response.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/MixedDocGroupedSummaryResponse'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/los-connect/book/{book_uuid}/loan:
    summary: Get loan details by book
    description: Provides loan details from Encompass using a book UUID.
    get:
      tags:
      - los-connect
      summary: Get loan details by book
      description: 'This operation retrieves loan details from Encompass using a book
        UUID.


        This endpoint looks up the Encompass loan associated with a book in Ocrolus.


        Requires BOOK READ permission for the specified book.'
      parameters:
      - description: UUID of the book
        required: true
        schema:
          type: string
          format: uuid
        name: book_uuid
        in: path
      responses:
        '200':
          description: Loan details retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/GetLoanDetailsByBookResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - invalid book identifier provided.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '403':
          description: Forbidden - no permission to access this book.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '404':
          description: Loan or book not found.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v2/los-connect/encompass/book:
    summary: Get book from Encompass loan
    description: Provides book details from Encompass using a loan ID or loan number.
    get:
      tags:
      - los-connect
      summary: Get book from Encompass loan
      description: 'This operation retrieves book details from Encompass using a loan
        identifier.


        This endpoint looks up a book in Ocrolus that is associated with an Encompass
        loan.


        Note: Exactly one of `loan_id` or `loan_number` must be provided to identify
        the loan.'
      parameters:
      - description: Loan GUID (loan ID) from Encompass
        required: false
        schema:
          type: string
        name: loan_id
        in: query
      - description: Loan number from Encompass
        required: false
        schema:
          type: string
        name: loan_number
        in: query
      responses:
        '200':
          description: Book details retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/GetBookFromEncompassLoanResponse'
                - $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request - exactly one of loan_id or loan_number must be
            provided, or invalid loan identifier.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '404':
          description: Loan or book not found in Encompass.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '403':
          description: Permission denied - no permission to access this book.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                  message:
                    type: string
                    description: Error message
                type: object
  /v2/mixed-document/{mixed_doc_uuid}/classification-summary:
    summary: Get mixed document classification summary
    description: Retrieves the classification summary for all forms in a mixed document.
    get:
      tags:
      - classify
      summary: Get mixed document classification summary
      description: 'This operation retrieves the classification summary for all forms
        in a mixed document.


        The response includes details about each form including its status, form type,
        upload origin, page details, and whether it is a duplicate.


        If `process_unknowns` is set to true, unknown forms will be processed and
        included in the response.'
      parameters:
      - description: UUID of the mixed document
        required: true
        schema:
          type: string
          format: uuid
        name: mixed_doc_uuid
        in: path
      - description: Whether to process unknown forms
        required: false
        schema:
          type: boolean
        name: process_unknowns
        in: query
      responses:
        '200':
          description: Classification summary response.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/MixedDocClassificationSummaryResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
  /v2/paystub/{paystub_uuid}:
    summary: Get paystub data
    description: Retrieves paystub data for a specific paystub UUID.
    get:
      tags:
      - capture
      summary: Get paystub data
      description: 'This operation retrieves paystub data for a specific paystub identified
        by UUID.


        The response includes a single paystub object containing employer information,
        employee information, paystub details, earnings, deductions, and net pay data.


        If normalized fields are included in the organization configuration, the response
        will include `formatted_data` for the paystub.


        If validation data is included in the organization configuration, the response
        will include `validations_summary` for the paystub.'
      parameters:
      - description: UUID of the paystub
        required: true
        schema:
          type: string
          format: uuid
        name: paystub_uuid
        in: path
      responses:
        '200':
          description: Paystub data retrieved successfully.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/PaystubResponseWrapper'
                - $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AccountLevelWebhookTestResponse:
      properties:
        resp_code:
          type: integer
          title: Resp Code
          description: HTTP response code from the webhook endpoint
        message:
          type: string
          title: Message
          description: Response message from the webhook test
      additionalProperties: false
      type: object
      required:
      - resp_code
      - message
      title: AccountLevelWebhookTestResponse
      description: Response for testing an account-level webhook.
    AccountLevelWebhookTestResponseWrapper:
      properties:
        status:
          type: integer
          title: Status
          description: HTTP status code
          default: 200
        message:
          type: string
          title: Message
          description: Response message
          default: OK
        response:
          $ref: '#/components/schemas/AccountLevelWebhookTestResponse'
          description: Test account-level webhook response data
      additionalProperties: false
      type: object
      required:
      - response
      title: AccountLevelWebhookTestResponseWrapper
      description: Wrapper for test account-level webhook response.
    Alert:
      properties:
        message:
          type: string
          title: Message
          description: Alert message
        severity:
          type: string
          title: Severity
          description: Alert severity
        income_type:
          type: string
          enum:
          - UNKNOWN_INCOME_TYPE
          - RENTAL
          - SELF_EMPLOYED
          - WAGE_EARNER
          - OTHER
          title: Income Type
          description: Income type associated with the alert
      additionalProperties: false
      type: object
      required:
      - message
      - severity
      - income_type
      title: Alert
      description: Alert information.
    AmountCustomization:
      properties:
        gt:
          anyOf:
          - type: number
          - type: 'null'
          title: Gt
          description: Greater than amount
        lt:
          anyOf:
          - type: number
          - type: 'null'
          title: Lt
          description: Less than amount
        eq:
          anyOf:
          - type: number
          - type: 'null'
          title: Eq
          description: Equal to amount
      additionalProperties: false
      type: object
      title: AmountCustomization
      description: Amount customization for tag matching.
    BankStatementIncomeV2Response:
      properties:
        book_uuid:
          type: string
          format: uuid
          title: Book Uuid
          description: UUID of the book
        calculated_at:
          type: string
          title: Calculated At
          description: ISO timestamp when the calculation was performed
        bank_statement_income:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Bank Statement Income
          description: List of bank statement income calculations per account
      additionalProperties: false
      type: object
      required:
      - book_uuid
      - calculated_at
      - bank_statement_income
      title: BankStatementIncomeV2Response
      description: Response data for bank statement income v2.
    BenchmarkMetric:
      properties:
        metric:
          type: string
          title: Metric
          description: Name of the benchmark metric (e.g., 'revenue', 'expense', 'fintech_inflows')
        value:
          type: number
          title: Value
          description: Value of the metric for the book
        percentile:
          type: number
          title: Percentile
          description: Percentile rank of the book's value compared to the benchmark
            (0.0 to 100.0)
      additionalProperties: false
      type: object
      required:
      - metric
      - value
      - percentile
      title: BenchmarkMetric
      description: A single benchmark metric with its value and percentile.
    BenchmarkResponse:
      properties:
        book_uuid:
          type: string
          title: Book Uuid
          description: UUID of the book
        start_month:
          type: string
          title: Start Month
          description: 'Start month of the benchmark period (format: YYYY-MM)'
        end_month:
          type: string
          title: End Month
          description: 'End month of the benchmark period (format: YYYY-MM)'
        naics4_code:
          type: integer
          title: Naics4 Code
          description: NAICS 4-digit industry code used for benchmarking
        naics4_title:
          type: string
          title: Naics4 Title
          description: Title/description of the NAICS 4-digit industry code
        benchmark:
          items:
            $ref: '#/components/schemas/BenchmarkMetric'
          type: array
          title: Benchmark
          description: List of benchmark metrics comparing the book's performance
            to industry peers
      additionalProperties: false
      type: object
      required:
      - book_uuid
      - start_month
      - end_month
      - naics4_code
      - naics4_title
      - benchmark
      title: BenchmarkResponse
      description: Response data for benchmark analytics.
    BookAddRequest:
      properties:
        name:
          type: string
          title: Name
          description: Name of the book
        book_class:
          type: string
          enum:
          - COMPLETE
          - INSTANT
          - INSTANT_CLASSIFY_ONLY
          - INSTANT_CLASSIFY_ISO_CAPTURE
          title: Book Class
          description: Book class
          default: COMPLETE
        book_type:
          type: string
          enum:
          - DEFAULT
          - OPTIMA
          title: Book Type
          description: Type of the book
          default: DEFAULT
        is_public:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Public
          description: Whether the book is public
        xid:
          anyOf:
          - type: string
          - type: 'null'
          title: Xid
          description: External ID of the book
      additionalProperties: false
      type: object
      required:
